<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="theme-color" content="#000000">
    <meta name="rnbo-version" content="1.0.0-alpha.5">
    <link rel="stylesheet" href="style/app.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Noise - No Input Feedback</title>
</head>

<body>
   <div id="app-root">

        <div id="enter-overlay">
            <div id="enter-content">
              <div id="enter-text"></div>
              <button id="enter-button" type="button"> >>> </button>
            </div>
        </div>

        <div id="gameover-overlay">
          <div id="gameover-content">G4M3 0V3R</div>
        </div>

        <div id="oscilloscope-container">
          <canvas id="oscilloscope" width="320" height="70"></canvas>
        </div>

        <div id="penalty-counter">
          <div id="sharpness-display">
            <div class="sharpness-label">SHARP</div>
            <div id="sharpness-value">0.00</div>
          </div>
          <div class="life-label"> &#9829; </div>
          <div class="life-bar">
            <div id="life-fill"></div>
          </div>
          <div class="life-value" id="penalty-counter-value">10.0</div>
        </div>

        <div id="xy-pad-container">
          <canvas id="xy-pad" width="320" height="320"></canvas>
        </div>

        <div id="touch-debug" class="touch-debug">[--, --, --]</div>

      </div>

   <script type="text/javascript" src="https://cdn.cycling74.com/rnbo/1.4.2/rnbo.min.js"></script>

    <!-- Load the script that creates the RNBO device  -->
    <!-- Uncomment if you know the version of your exported RNBO patch to avoid dynamic loading -->
    <!-- <script type="text/javascript" src="https://cdn.cycling74.com/rnbo/latest/rnbo.min.js"></script> -->

    <!-- (Optional) The guardrails.js script isn't required for RNBO to work, and you can skip including it -->
    <!-- It simply offers some helpful error messages for common problems -->
    <!-- <script type="text/javascript" src="js/guardrails.js"></script> -->

    <!-- Import RNBO Engine Wrapper -->
    <!-- Make sure to include the RNBO engine version to the version of your exported code, found in rnbopackage.json -->
    <script type="text/javascript" src="js/app.js"></script>
</body>
</html>
